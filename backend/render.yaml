services:
  - type: web
    name: papertrail-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: CUDA_VISIBLE_DEVICES
        value: ""
