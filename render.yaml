services:
  - type: web
    name: papertrail
    env: python
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: .
      - key: GROQ_API_KEY
        sync: false
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: WEB_CONCURRENCY
        value: "1"
    plan: free
